<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seriixo</title>
  <link rel="canonical" href="/">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: #fce8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    /* ── Card ── */
    .card {
      background: #fff7fa;
      border-radius: 28px;
      width: 100%;
      max-width: 420px;
      padding: 36px 28px 32px;
      box-shadow: 0 8px 32px rgba(220, 100, 150, 0.15);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Avatar ── */
    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      object-fit: cover;
      object-position: center 15%;
      border: 3px solid #f4b8d0;
      box-shadow: 0 4px 16px rgba(220, 100, 150, 0.18);
      display: block;
    }

    /* ── Profile ── */
    .profile-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      color: #2d2040;
      margin-top: 14px;
      text-align: center;
    }

    .profile-bio {
      font-size: 0.85rem;
      color: #7a6e9a;
      margin-top: 6px;
      text-align: center;
      line-height: 1.6;
      max-width: 280px;
    }

    /* ── Divider ── */
    .divider {
      width: 100%;
      height: 1px;
      background: #f9c8e0;
      margin: 24px 0 20px;
    }

    /* ── Link buttons ── */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 11px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 13px 16px;
      border-radius: 100px;
      border: 2px solid #f4b8d0;
      background: #fff;
      text-decoration: none;
      font-family: 'Nunito', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      color: #b06080;
      transition: transform 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
    }

    .link-btn:hover {
      transform: translateY(-2px);
      background: #fff0f7;
      box-shadow: 0 6px 18px rgba(220, 100, 150, 0.15);
    }

    .link-btn:active {
      transform: translateY(0);
    }

    .btn-icon {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #fce8f2;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .btn-icon svg {
      width: 16px;
      height: 16px;
      fill: #d4608a;
    }

    .btn-label {
      flex: 1;
      text-align: center;
      padding-right: 44px; /* optical centre offset */
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .btn-label-main {
      display: block;
    }

    .btn-label-sub {
      display: block;
      font-size: 0.72rem;
      font-weight: 600;
      opacity: 0.65;
    }

    button.link-btn {
      cursor: pointer;
      border-color: #f4b8d0;
      width: 100%;
    }

    .btn-photo {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
      border: 1.5px solid #f4b8d0;
    }

    /* ── Section label ── */
    .section-label {
      width: 100%;
      font-family: 'Nunito', sans-serif;
      font-size: 0.75rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: #1a1a1a;
      margin-bottom: 2px;
      text-align: center;
    }

    .section-gap {
      margin-top: 16px;
    }


    /* ── Mobile ── */
    @media (max-width: 480px) {
      body {
        padding: 16px 12px;
        align-items: flex-start;
      }

      .card {
        padding: 28px 20px 26px;
        border-radius: 22px;
      }

      .avatar {
        width: 84px;
        height: 84px;
        object-position: center 15%;
      }

      .profile-name {
        font-size: 1.4rem;
      }

      .link-btn {
        padding: 12px 14px;
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>

  </div>

  <script>
    function copyEmail(btn) {
      const email = btn.dataset.email;
      navigator.clipboard.writeText(email).then(() => {
        const main = btn.querySelector('.btn-label-main');
        const sub  = btn.querySelector('.btn-label-sub');
        const prevMain = main.textContent;
        const prevSub  = sub.textContent;
        main.textContent = 'Copied!';
        sub.textContent  = email;
        setTimeout(() => {
          main.textContent = prevMain;
          sub.textContent  = prevSub;
        }, 2000);
      });
    }
  </script>
</body>
</html>
